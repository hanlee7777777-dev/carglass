.hero:after{display:none!important;content:none!important}
.hero .badgeTop{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;backdrop-filter:blur(8px)}
.hero h1{font-size:48px;letter-spacing:-2.4px;line-height:1.04;margin:24px 0 14px;font-weight:1000;text-shadow:0 4px 14px rgba(0,0,0,.45)}
.hero h1 span{display:block;color:#4ec0ff}
.hero .slogan{font-size:24px;font-weight:1000;line-height:1.25;margin:0 0 12px;letter-spacing:-1.2px}
.hero .desc{font-size:15px;line-height:1.6;color:#eaf4ff;margin:0 0 20px;font-weight:750}
.heroBtns{display:grid;gap:10px;margin-top:18px;position:relative;z-index:2}
.heroBtns a{height:56px;border-radius:14px;text-decoration:none;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:18px}
.heroBtns .primary{background:#fff;color:#082243}
.heroBtns .tel{background:#0869e8;color:#fff;box-shadow:0 8px 20px rgba(8,105,232,.38)}
.heroBtns .blog{background:#05a63b;color:#fff}
.stats{position:relative;margin-top:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stats div{background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(238,247,255,.94));border:1px solid rgba(255,255,255,.9);border-radius:18px;padding:16px 6px 14px;text-align:center;backdrop-filter:blur(10px);box-shadow:0 10px 26px rgba(0,80,180,.18);animation:softFloat 3.2s ease-in-out infinite;min-height:118px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stats b{display:block;font-size:20px;color:#075ed6;line-height:1.15;text-shadow:none;font-weight:1000;letter-spacing:-.5px}
.stats span{display:block;font-size:13px;color:#10243b;margin-top:9px;font-weight:900;line-height:1.25}

.quick{padding:20px 18px;background:#fff}
.quickQMark{display:block;font-size:48px;font-weight:800;color:#123456;line-height:1;margin-bottom:-10px;font-family:Georgia,serif;}
.quick h2,.damage h2,.consult h2,.cases h2{margin:0 0 12px;font-size:28px;letter-spacing:-1.6px;line-height:1.18}
.quick p{margin:0 0 15px;color:#516174;font-size:14px;font-weight:750;line-height:1.55}
.quickGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quickGrid a{height:72px;border-radius:17px;text-decoration:none;padding:13px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.08);font-weight:1000}
.quickGrid b{font-size:17px}
.quickGrid span{font-size:12px;margin-top:5px;font-weight:800}
.q1{background:#0869e8;color:#fff}.q2{background:#ffdf00;color:#111}.q3{background:#05a63b;color:#fff}.q4{background:#fff;color:#e50012;border:2px solid #e50012}

.consult{padding:26px 18px;background:linear-gradient(180deg,#071f3e,#020b17);color:#fff}
.consult h2{color:#fff;font-size:31px}
.consult p{color:#dbe9fb;font-size:14px;font-weight:750;line-height:1.6;margin:0 0 16px}
.formCard{background:#fff;border-radius:22px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.28)}
.formCard label{display:block;color:#0b1e33;font-weight:900;font-size:13px;margin:10px 0 6px}
.formCard input,.formCard select,.formCard textarea{width:100%;border:1px solid #d8e0eb;border-radius:13px;padding:13px;font-size:15px;font-weight:700;background:#f7f9fc;outline:none}
.formCard textarea{min-height:82px;resize:vertical}
.formCard button,.formCard a.submitLink{margin-top:12px;width:100%;height:54px;border:0;border-radius:15px;background:#0869e8;color:#fff;font-size:17px;font-weight:1000;display:flex;align-items:center;justify-content:center;text-decoration:none}

.damage{padding:26px 18px;background:#f6f9fd}
.damage .lead{margin:0 0 14px;color:#536477;font-size:14px;font-weight:750;line-height:1.55}
.damageImages{display:grid;gap:12px}
.damageImg{background:#fff;border-radius:20px;padding:12px;box-shadow:0 8px 24px rgba(6,26,51,.09);overflow:hidden}
.damageImg img{width:100%;border-radius:14px;filter:contrast(1.08)}
.damageNote{font-size:12px;font-weight:800;line-height:1.5;background:#fff;border:1px solid #d8e0eb;border-radius:16px;padding:13px;margin-top:12px}

.cases{padding:26px 18px;background:#fff}
.caseCard{display:block;text-decoration:none;color:inherit;background:#f6f9fd;border-radius:23px;overflow:hidden;margin:14px 0;box-shadow:0 10px 28px rgba(6,26,51,.08)}
.caseImg{height:178px;background:linear-gradient(135deg,#193a62,#b8d7ec);position:relative;overflow:hidden}
.caseImg:before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=900&q=70') center/cover;opacity:.68}

.caseImg span{position:absolute;left:14px;top:14px;background:#061a33;color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:1000}
.caseBody{padding:12px 16px}
.caseBody h3{font-size:21px;margin:0 0 1px;letter-spacing:-.8px}
.caseBody p{margin:0;color:#576679;font-size:13px;line-height:1.3;font-weight:750}
.caseBody .more{display:block;margin-top:12px;text-align:center;background:#05a63b;color:#fff;font-weight:700;font-size:16px;padding:13px 16px;border-radius:14px;letter-spacing:-.4px}

.promise{padding:30px 18px;background:#061a33;color:#fff;text-align:center}
.promise h2{font-size:31px;line-height:1.12;margin:0 0 10px;letter-spacing:-1.8px}
.promise p{font-size:14px;color:#d9e9fb;line-height:1.6;font-weight:750;margin:0 0 17px}
.promise .warranty{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#e50012;border-radius:999px;padding:13px 16px;font-weight:1000;text-decoration:none;font-size:16px}

.finalCta{padding:36px 20px 46px;background:linear-gradient(180deg,#071f3e,#020b17);color:#fff;text-align:center}
.finalCta h2{font-size:35px;letter-spacing:-2px;line-height:1.15;margin:0 0 13px}
.finalCta p{color:#dbe9fb;font-size:15px;font-weight:750;line-height:1.6;margin:0 0 18px}
.finalCta a{display:flex;height:58px;align-items:center;justify-content:center;margin:10px 0;border-radius:16px;text-decoration:none;font-size:19px;font-weight:1000}
.finalCta .tel{background:#0869e8;color:#fff}.finalCta .blog{background:#05a63b;color:#fff}
.finalCta .goldBadge{display:inline-flex;align-items:center;gap:8px;margin-top:26px;padding:12px 22px;border-radius:999px;background:linear-gradient(135deg,#fdf6e2 0%,#f6dfa3 100%);border:1.5px solid #d9b96a;box-shadow:0 6px 16px rgba(180,140,50,.25);color:#4a3216;font-weight:800;font-size:14.5px}
.finalCta .goldBadge .badgeDot{width:8px;height:8px;border-radius:50%;background:#2ecc71;box-shadow:0 0 0 3px rgba(46,204,113,.25)}

.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:9px 9px 10px;border-top:1px solid #dce5ef;z-index:80}
.bottom a{text-decoration:none;color:#fff;height:55px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:15px}
.bottom .bTel{background:#0869e8;animation:pulse 1.4s infinite}.bottom .bKakao{background:#f7c600;color:#111;border:1.5px solid #d9a800}.bottom .bBlog{background:#05a63b}
.stats div:nth-child(2){animation-delay:.18s}.stats div:nth-child(3){animation-delay:.36s}@keyframes softFloat{0%,100%{transform:translateY(0);box-shadow:0 10px 26px rgba(0,80,180,.18)}50%{transform:translateY(-7px);box-shadow:0 18px 34px rgba(0,105,232,.25)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

.hero h1{font-size:43px}.quickGrid{grid-template-columns:1fr}.bottom a{font-size:13px}
}

.logo{display:flex;align-items:center;gap:10px}
.logoImg{width:62px;height:62px;object-fit:contain;display:block;flex:0 0 auto}
.logo .mark{display:none!important}
.logoText b{display:block;font-size:15px;line-height:1;font-weight:1000;color:#051f40}

.top{height:72px}

.simpleSteps{padding:28px 18px;background:linear-gradient(180deg,#f7fbff,#eef5fb)}
.simpleSteps h2{text-align:center;font-size:30px;margin:0 0 8px;color:#123456;letter-spacing:-1.6px}
.simpleSteps .sub{text-align:center;margin:0 0 18px;color:#5e6b7a;font-size:15px;font-weight:800}
.stepCard{background:#fff;border-radius:22px;padding:20px 18px;margin:14px 0;box-shadow:0 10px 26px rgba(6,26,51,.09);border:1px solid #e7eef6}
.stepBadge{display:inline-flex;background:#e7f7f7;color:#227985;border-radius:999px;padding:7px 13px;font-weight:1000;font-size:13px;margin-bottom:14px}
.stepRow{display:flex;gap:16px;align-items:center}
.stepIcon{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#123b67,#092341);color:#fff;display:grid;place-items:center;font-size:30px;flex:0 0 auto}
.stepText b{display:block;font-size:22px;color:#153657;letter-spacing:-1px}

.noticeBox{margin-top:22px;background:#fff8e9;border:1.5px solid #f2d093;border-radius:22px;padding:18px;display:flex;gap:14px;align-items:center}
.noticeIcon{width:58px;height:58px;border-radius:50%;background:#ffb735;color:#fff;display:grid;place-items:center;font-size:30px;flex:0 0 auto}
.noticeBox b{display:block;color:#9a6810;font-size:21px;letter-spacing:-1px}
.noticeBox span{display:block;color:#9a6810;font-size:14px;font-weight:800;margin-top:5px}

/* premium stats rebuilt */
.stats{display:none!important}
.premiumStats{
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  position:relative;
  z-index:8;
}
.premiumCard{
  height:154px;
  border-radius:22px;
  background:linear-gradient(180deg,#ffffff 0%,#f1f8ff 100%);
  border:1.5px solid rgba(180,220,255,.95);
  box-shadow:0 0 20px rgba(43,132,255,.45),0 16px 32px rgba(0,20,60,.28);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:13px 5px;
  animation:premiumFloat 3.2s ease-in-out infinite;
}
.premiumCard:nth-child(2){animation-delay:.18s}
.premiumCard:nth-child(3){animation-delay:.36s}
.premiumIcon{
  width:50px;
  height:50px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffffff,#dceeff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#0869e8;
  font-size:27px;
  margin-bottom:13px;
  box-shadow:inset 0 0 0 1px rgba(8,105,232,.08);
}
.premiumCard strong{
  display:block;
  color:#0869e8;
  font-size:26px;
  font-weight:1000;
  line-height:1.05;
  letter-spacing:-1.3px;
  white-space:nowrap;
}
.premiumCard p{
  margin:10px 0 0;
  color:#061a33;
  font-size:14.5px;
  font-weight:900;
  line-height:1.2;
  white-space:nowrap;
}
.premiumCard i{
  width:74%;
  height:4px;
  border-radius:999px;
  background:linear-gradient(90deg,#5bd0ff,#0869e8,#5bd0ff);
  margin-top:14px;
  display:block;
  box-shadow:0 0 9px rgba(8,105,232,.35);
}
@keyframes premiumFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
@media(max-width:370px){
  .premiumStats{gap:7px;margin-top:20px}
  .premiumCard{height:134px;border-radius:18px;padding:11px 3px}
  .premiumIcon{width:40px;height:40px;font-size:22px;margin-bottom:10px}
  .premiumCard strong{font-size:21px;letter-spacing:-1px}
  .premiumCard p{font-size:12px;margin-top:8px}
  .premiumCard i{height:3px;margin-top:11px}
}
